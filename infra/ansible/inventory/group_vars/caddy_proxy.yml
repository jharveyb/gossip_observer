# Caddy reverse-proxy group variables.
#
# Caddy sits behind a Cloudflare Tunnel: it listens on loopback only, and
# Cloudflare terminates TLS at the edge for data.<your-domain>. Caddy's
# remaining job is to enforce request-body limits, log access, and proxy
# to Garage's S3 API on loopback.

# Loopback port Caddy listens on. Cloudflared's Public Hostname rule for
# data.<your-domain> must point at this port (HTTP://localhost:<port>).
caddy_public_port: 3939

# Upstream Garage S3 API. Loopback because Garage runs on the same host.
caddy_garage_upstream: "127.0.0.1:3900"

# Max accepted request body. Parquet uploads from rclone can be multi-GB.
caddy_max_request_size: "3GB"

# Installs Caddy from the official Cloudsmith apt repo and templates a
# Caddyfile that listens on loopback and reverse-proxies to Garage's S3
# API. Public traffic reaches Caddy via Cloudflare Tunnel (cloudflared);
# no public port is opened in UFW.

- name: Install Caddy apt repo signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.asc
    owner: root
    group: root
    mode: "0644"

- name: Install Caddy apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/caddy-stable.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    filename: caddy-stable
    state: present
    update_cache: true

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: caddy
    mode: "0640"
    validate: "caddy validate --config %s --adapter caddyfile"
  notify: Reload Caddy


- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: reloaded
